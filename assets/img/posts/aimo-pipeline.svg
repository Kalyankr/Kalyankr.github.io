  <text class="s"  x="815" y="83">parse · mod · clamp</text>
  <line x1="172" y1="69" x2="198" y2="69" marker-end="url(#a)"/>
  <line x1="352" y1="69" x2="378" y2="69" marker-end="url(#a)"/>
  <line x1="532" y1="69" x2="558" y2="69" marker-end="url(#a)"/>
  <line x1="712" y1="69" x2="738" y2="69" marker-end="url(#a)"/>
