---
layout: default
---
<article class="prose">
  <a class="back" href="{{ '/' | relative_url }}">← Back</a>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    {{ page.date | date: "%B %-d, %Y" }}
    {%- if page.tags and page.tags.size > 0 %} · {{ page.tags | join: ", " }}{% endif -%}
  </div>
  {{ content }}
</article>
